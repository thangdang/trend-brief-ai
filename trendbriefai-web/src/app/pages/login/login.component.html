<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:1rem">
  <div style="max-width:420px;width:100%">
    <div style="text-align:center;margin-bottom:2rem">
      <h1 style="font-size:1.8rem;font-weight:700;color:#6366f1">📰 TrendBrief AI</h1>
      <p style="color:#64748b">Đăng nhập để đọc tin cá nhân hóa</p>
    </div>

    <div style="background:white;border-radius:16px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.08)">
      <div *ngIf="error" style="background:#fef2f2;color:#dc2626;padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:.875rem">{{ error }}</div>

      <div style="margin-bottom:1.5rem">
        <div id="google-signin-btn" style="margin-bottom:.75rem"></div>
        <button (click)="loginWithApple()" [disabled]="ssoLoading==='apple'"
                style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:#000;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:.9rem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Đăng nhập với Apple
        </button>
      </div>

      <div style="text-align:center;color:#94a3b8;margin-bottom:1.5rem;font-size:.8rem">── hoặc dùng email ──</div>

      <div *ngIf="isRegister" style="margin-bottom:1rem">
        <input type="text" [(ngModel)]="nameField" placeholder="Họ tên"
               style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.9rem">
      </div>
      <div style="margin-bottom:1rem">
        <input type="email" [(ngModel)]="email" placeholder="Email"
               style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.9rem">
      </div>
      <div style="margin-bottom:1.5rem">
        <input type="password" [(ngModel)]="password" (keyup.enter)="submit()" placeholder="Mật khẩu"
               style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.9rem">
      </div>

      <button (click)="submit()" [disabled]="loading"
              style="width:100%;background:#6366f1;color:white;border:none;padding:12px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600">
        {{ loading ? 'Đang xử lý...' : (isRegister ? 'Đăng ký' : 'Đăng nhập') }}
      </button>

      <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:#64748b">
        <a href="javascript:void(0)" (click)="isRegister=!isRegister" style="color:#6366f1;text-decoration:none">
          {{ isRegister ? 'Đã có tài khoản? Đăng nhập' : 'Chưa có tài khoản? Đăng ký' }}
        </a>
      </p>
    </div>
  </div>
</div>
